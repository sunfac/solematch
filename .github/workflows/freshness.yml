name: Freshness — weekly link health + price drops
# What this does (run weekly + on demand):
#   1. Health-checks every offer URL → flag dead retailer patterns
#   2. Scrapes live prices via firecrawl → write streetPriceGbp + priceDropped
#      on the offers that have actually dropped
#   3. Opens a PR if anything changed — never auto-merges to master, so the
#      owner reviews price snapshots before they go live
# Required secrets:
#   FIRECRAWL_API_KEY  - firecrawl token (free tier covers weekly runs)
# Optional secrets (gate redundant network failure noise):
#   none — the checker is read-only against retailer URLs
on:
  schedule:
    - cron: '17 4 * * 1'   # Mondays 04:17 UTC (off-peak; retailer load light)
  workflow_dispatch:        # manual trigger from the Actions tab

permissions:
  contents: write
  pull-requests: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci

      - name: Link health (writes nothing — diagnostic only)
        run: npx tsx scripts/check-links.ts > link-health.log || true
      - name: Upload link health report
        uses: actions/upload-artifact@v4
        with:
          name: link-health
          path: link-health.log
          retention-days: 30

      - name: Live prices (writes offers.json on drops)
        env:
          FIRECRAWL_API_KEY: ${{ secrets.FIRECRAWL_API_KEY }}
        run: npx tsx scripts/check-prices.ts --retailer SportsShoes || true

      - name: Detect changes
        id: diff
        run: |
          if git diff --quiet -- src/data/offers.json; then
            echo "changed=no" >> "$GITHUB_OUTPUT"
          else
            echo "changed=yes" >> "$GITHUB_OUTPUT"
          fi

      - name: Open PR with the refreshed snapshot
        if: steps.diff.outputs.changed == 'yes'
        uses: peter-evans/create-pull-request@v6
        with:
          branch: freshness/weekly-${{ github.run_id }}
          commit-message: 'chore: weekly freshness snapshot (prices + link health)'
          title: 'chore: weekly freshness snapshot'
          body: |
            Scheduled freshness job. Review the price diff and link-health
            artifact before merging — the snapshot drives the "was £X / now
            £Y" UI live the moment it merges.

            * Link health report: see the `link-health` workflow artifact
            * Price diff: this PR's changes to `src/data/offers.json`

            Generated by `.github/workflows/freshness.yml`.
          delete-branch: true
